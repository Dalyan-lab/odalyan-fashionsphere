services:
  postgres:
    image: postgres:16-alpine
    container_name: odalyan_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: odalyan
      POSTGRES_PASSWORD: odalyan
      POSTGRES_DB: fashionsphere
    ports:
      # 5433 côté hôte pour éviter tout conflit avec un PostgreSQL déjà installé localement
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odalyan -d fashionsphere"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: odalyan_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
