<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hors ligne — Odalyan FashionSphere</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 20%, rgba(124, 58, 237, 0.35), transparent 55%),
          #0a0710;
        color: #f6f3fb;
        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
        padding: 24px;
      }
      img { width: 88px; height: 88px; object-fit: contain; }
      h1 { font-size: 1.5rem; margin: 18px 0 6px; }
      p { color: #9a90ac; max-width: 320px; }
      button {
        margin-top: 20px;
        border: 0;
        border-radius: 12px;
        padding: 12px 22px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #7c3aed, #c0306a);
      }
    </style>
  </head>
  <body>
    <div>
      <img src="/icon-192.png" alt="Odalyan" />
      <h1>Vous êtes hors ligne</h1>
      <p>Reconnectez-vous à Internet pour accéder à Odalyan FashionSphere. Les pages déjà visitées restent disponibles.</p>
      <button onclick="location.reload()">Réessayer</button>
    </div>
  </body>
</html>
